# Public Tinfoil measured config — Vendo confidential Affine.
# S1 = stock Affine + in-enclave Postgres+Redis, debug, no durability yet.
# Tinfoil enclave = ReadonlyRootfs + CapDrop=ALL + no setuid → run rootless,
# declare writable volumes for data/runtime dirs. The shim wires its upstream
# to the FIRST container, so the app (affine) must be first.
cvm-version: 0.10.4
cpus: 2
memory: 16384

networks:
  web:
    egress: open

containers:
  - name: "unlock"
    image: "ghcr.io/runvendo/confidential-affine-unlock-gate@sha256:4b7ff43ed0e3922e9ea599dbe94fe7ea8071f168fadff9dbe939bfc5bed65b8f"
    restart: always
    networks: [web]
    env:
      - AFFINE_UPSTREAM: "http://affine:3010"
      # KEYWRAP_OBJECT is injected per-deployment by Vendo's TinfoilProvider as a
      # Tinfoil `variable` (keyed by the immutable deployment id) — NOT hardcoded
      # here, so each deployment gets an isolated keywrap. A literal here would
      # shadow the variable (all deployments would share one keywrap).
    secrets:
      - R2_ACCESS_KEY_ID
      - R2_SECRET_ACCESS_KEY
      - R2_ACCOUNT_ID
      - R2_BUCKET

  - name: "affine"
    image: "ghcr.io/toeverything/affine@sha256:725aaceb0ed94d4b832ae6ef9414503291c9b2b4f60bd6f3c7eef571b6149add"
    restart: always
    networks: [web]
    volumes:
      - /mnt/ramdisk/affinedata:/root/.affine
      - /mnt/ramdisk/affinetmp:/tmp
      - /mnt/ramdisk/affinesrc:/app/src
    env:
      - NODE_ENV: "production"
      - YARN_CACHE_FOLDER: "/tmp/.yarn-cache"
      - AFFINE_SERVER_PORT: "3010"
      - PORT: "3010"
      # AFFINE_SERVER_EXTERNAL_URL injected per-deployment (the enclave's own
      # attested domain) by TinfoilProvider — not hardcoded.
      - AFFINE_INDEXER_ENABLED: "false"
      - DATABASE_URL: "postgresql://affine:affine_s1_local@postgres:5432/affine"
      - REDIS_SERVER_HOST: "redis"
      - REDIS_SERVER_PORT: "6379"
      - VENDO_OPENAI_API_KEY: "vendo"
      - VENDO_OPENAI_BASE_URL: "http://modelproxy:8081/v1"
    command:
      - "sh"
      - "-c"
      - >-
        mkdir -p /root/.affine/config
        && printf '{"copilot":{"enabled":true,"providers.openai":{"apiKey":"%s","baseURL":"%s"}}}' "${VENDO_OPENAI_API_KEY}" "${VENDO_OPENAI_BASE_URL}" > /root/.affine/config/config.json
        && until node -e 'const s=require("net").connect(5432,"postgres",()=>{s.end();process.exit(0)});s.on("error",()=>process.exit(1));setTimeout(()=>process.exit(1),2000)' 2>/dev/null; do echo "[vendo] waiting for postgres (locked?)"; sleep 4; done
        && node ./scripts/self-host-predeploy.js
        && exec node ./dist/main.js

  - name: "postgres"
    image: "ghcr.io/runvendo/confidential-affine-postgres-walg@sha256:a5657c3cb8237578759395da4c04c585c414b9c08f7bf1f51e1a126dfeb6cf6d"
    restart: always
    networks: [web]
    env:
      - POSTGRES_DB: "affine"
      - POSTGRES_USER: "affine"
      - POSTGRES_PASSWORD: "affine_s1_local"
      - PGDATA: "/var/lib/postgresql/data/pgdata"
      # WALG_PREFIX injected per-deployment by TinfoilProvider (keyed by the
      # immutable deployment id) — not hardcoded, so each tenant's encrypted WAL
      # lives under its own R2 prefix. A literal here would collapse all tenants
      # onto one WAL stream.
      - WALG_LIBSODIUM_KEY_TRANSFORM: "base64"
      - AWS_REGION: "auto"
    secrets:
      - R2_ACCESS_KEY_ID
      - R2_SECRET_ACCESS_KEY
      - R2_ACCOUNT_ID
      - R2_BUCKET
    # no healthcheck: postgres intentionally blocks (waiting for the unlock-gate
    # key) until the user unlocks, which happens AFTER deploy. A healthcheck here
    # would fail the deploy. It serves once unlocked.

  - name: "redis"
    image: "redis:7.2@sha256:e51cbc16f94b2426e80b9516db174a07d55e882217a1ec1d729b137b32e24e42"
    restart: always
    networks: [web]
    entrypoint: ["redis-server"]
    command: ["--dir", "/data", "--save", ""]
    volumes:
      - /mnt/ramdisk/redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 20

  - name: "modelproxy"
    image: "ghcr.io/runvendo/confidential-affine-modelproxy@sha256:b3fb19294b3bc690371fb5b88e90c43475f31a504c88ea4f109ded36afaa9020"
    restart: always
    networks: [web]
    env:
      - PORT: "8081"
      - CHAT_MODEL: "gpt-oss-120b"
      - EMBED_MODEL: "nomic-embed-text"
    secrets:
      - INFERENCE_API_KEY

shim:
  upstream-port: 3010
  paths:
    - /*
