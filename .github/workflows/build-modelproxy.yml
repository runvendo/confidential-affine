name: Build modelproxy
run-name: Build modelproxy ${{ inputs.tag }}
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag (e.g. v1)'
        required: true
        type: string
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8
        with:
          persist-credentials: false
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd
      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f
        with:
          context: ./services/modelproxy
          platforms: linux/amd64
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/confidential-affine-modelproxy:${{ inputs.tag }}
      - name: Output digest
        run: echo "modelproxy digest ${{ steps.build.outputs.digest }}"
