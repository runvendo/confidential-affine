name: Tinfoil Release - Publish (auto-triggered)
run-name: Publish release ${{ github.ref_name }}
on:
  workflow_dispatch:
concurrency:
  group: tinfoil-container-release-${{ github.ref_name }}
jobs:
  measure-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
    steps:
      - name: Measure image, attest, and publish the release
        uses: tinfoilsh/measure-image-action@e9967c4a2dd60bacc7cce9e4315c5ebcd46118e9
        with:
          config-file: ${{ github.workspace }}/tinfoil-config.yml
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # The in-browser tinfoil-js Verifier resolves the expected measurement from
      # the repo's GitHub "latest" release. A confidential deployment runs the tag
      # Vendo pins (TINFOIL_CONFIG_TAG), so that release MUST be "latest" or the
      # unlock page's verify-gate fails closed against a genuine enclave. Mark it.
      - name: Mark release as latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: gh release edit "$TAG" --repo "$REPO" --latest
